project:
  type: website
  output-dir: docs

execute:
  echo: false
  warning: false
  message: false

website:
  title: "VisualMath"
  site-url: https://apurvanakade.github.io/VisualMath
  page-navigation: true
  bread-crumbs: true

  navbar:
    background: light
    search: true
    # left:
