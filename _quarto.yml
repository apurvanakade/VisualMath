project:
  type: website
  output-dir: docs

execute:
  echo: false
  warning: false
  message: false

format:
  html:
    theme:
      light: cosmo
      dark: cyborg
    css: styles.css
    toc: false
    html-math-method: mathjax
    include-in-header:
      - _includes/head-scripts.html

website:
  title: "VisualMath"
  site-url: https://apurvanakade.github.io/VisualMath
  page-navigation: true
  bread-crumbs: true

  navbar:
    background: light

  search:
    location: navbar
    type: textbox

  sidebar:
    - style: floating
      contents:
        - section: "Computational Math"
          href: computational-math/index.qmd
          contents: 
          - section: computational-math/root-finding/index.qmd
            contents: "computational-math/root-finding/*/index.qmd"
          - section: computational-math/piecewise-interpolation/index.qmd
            contents: "computational-math/piecewise-interpolation/*/index.qmd"
          - section: computational-math/differential-equations/index.qmd
            contents: "computational-math/differential-equations/*/index.qmd"
        - section: "Discrete Math"
          href: discrete-math/index.qmd
          contents:
          - section: discrete-math/sperners-lemma/index.qmd
            contents: "discrete-math/sperners-lemma/*/index.qmd"
        - section: "Data Science"
          href: data-science/index.qmd
          contents:
          - section: data-science/model-fitting/index.qmd
            contents: "data-science/model-fitting/*/index.qmd"
